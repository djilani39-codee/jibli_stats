workflows:
  ios-workflow:
    name: Jibli Stats iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          # سحب ملفات التوقيع وإنشاء شهادة جديدة
          # ملاحظة: تم حذف الأوامر التي تسبب تعارضاً مع إصدار CLI الحالي
          app-store-connect fetch-signing-files "com.jibli_stats" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          flutter build ios --release --no-codesign
          codemagic-cli-tools build-ipa --project-path ios --bundle-id "com.jibli_stats"
      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - djilanibenhacine5@gmail.com