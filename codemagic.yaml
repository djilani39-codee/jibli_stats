workflows:
  ios-workflow:
    name: Jibli Stats iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_auth # سنحتاج لربطها في واجهة Codemagic لاحقًا
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Build iOS IPA
        script: |
          # البناء بدون توقيع يدوي لأن Codemagic سيتولى الأمر
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - djilanibenhacine5@gmail.com  # استبدله بإيميلك لتصلك النسخة فور انتهاء البناء