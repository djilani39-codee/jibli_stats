workflows:
  ios-workflow:
    name: Jibli Stats iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          # التعديل هنا: حذفنا --publish-type وأضفنا النوع مباشرة بعد fetch-signing-files
          app-store-connect fetch-signing-files "com.jibli_stats" --type IOS_APP_STORE --create
          # التعديل هنا: استخدام الأمر الجديد لتعريف المتغيرات
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          # بناء التطبيق بدون محاولة التوقيع اليدوي لأن keychain سيتكفل بالأمر
          flutter build ios --release --no-codesign
          # تنفيذ التوقيع النهائي وتوليد ملف الـ IPA
          codemagic-cli-tools build-ipa --project-path ios --bundle-id "com.jibli_stats"
      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_ID \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - djilanibenhacine5@gmail.com