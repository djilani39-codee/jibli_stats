scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          # جلب ملفات التوقيع وإنشاء شهادة جديدة مرتبطة بالمفتاح الخاص بك
          app-store-connect fetch-signing-files "com.jibli_stats" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create \
            --bundle-id-name "JibliStatsApp"
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          flutter build ios --release --no-codesign
          codemagic-cli-tools build-ipa --project-path ios --bundle-id "com.jibli_stats"
      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"