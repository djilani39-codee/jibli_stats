workflows:
  ios-workflow:
    name: Jibli Stats iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      vars:
        XCODE_BUNDLE_ID: "com.jibli_stats" # تأكد من صحة المعرف هنا
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          # جلب الشهادات والبروفايلات بدون تعقيدات إضافية
          app-store-connect fetch-signing-files "$XCODE_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create
          keychain add-certificates
      - name: Build iOS IPA
        script: |
          # بناء وتحميل الشهادات وتوقيع الـ IPA في خطوة واحدة ذكية
          flutter build ios --release --build-number=$BUILD_NUMBER
          # توليد ملف الـ IPA النهائي
          codemagic-cli-tools build-ipa --project-path ios --bundle-id "$XCODE_BUNDLE_ID"
      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - djilanibenhacine5@gmail.com