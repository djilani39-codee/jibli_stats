workflows:
  ios-workflow:
    name: Jibli Stats iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.jibli_stats" --publish-type app-store --create
          export_signing_files
      - name: Build iOS IPA
        script: |
          flutter build ios --release --build-number=$BUILD_NUMBER
      - name: Publish to TestFlight
        script: |
          # هذا السطر سيقوم بالرفع يدوياً متجاوزاً أخطاء الـ YAML
          app-store-connect publish \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_ID \
            --private-key $APP_STORE_CONNECT_PRIVATE_KEY
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - djilanibenhacine5@gmail.com